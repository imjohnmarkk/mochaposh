palette = "catppuccin_mocha"

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$package\
$cmd_duration\
$fill\
$time\
$line_break\
$character"""

# ── OS ───────────────────────────────────────────────────────────────────────
[os]
disabled = false
style    = "mauve bold"

[os.symbols]
Windows = " "
Macos   = " "
Linux   = " "
Ubuntu  = " "
Debian  = " "
Arch    = "󰣇 "

# ── Username (only shows over SSH or as root) ────────────────────────────────
[username]
show_always = false
style_user  = "teal bold"
style_root  = "red bold"
format      = "[$user]($style) in "

# ── Directory ────────────────────────────────────────────────────────────────
[directory]
style             = "blue bold"
format            = "󰉋 [$path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncate_to_repo  = true
home_symbol       = "~"
read_only         = "  "
read_only_style   = "red"

# ── Git branch ───────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style  = "green bold"
format = "on [$symbol$branch]($style) "

# ── Git status (one icon per state) ──────────────────────────────────────────
[git_status]
style      = "peach bold"
format     = '([$conflicted$stashed$deleted$renamed$modified$staged$untracked$ahead_behind]($style) )'
conflicted = "󰞇 "
ahead      = "⇡$count "
behind     = "⇣$count "
diverged   = "⇕ "
up_to_date = "✓ "
untracked  = " $count "
stashed    = "󰏗 $count "
modified   = " $count "
staged     = " $count "
renamed    = " "
deleted    = " $count "

# ── Node.js ──────────────────────────────────────────────────────────────────
[nodejs]
symbol       = " "
style        = "green bold"
format       = "via [$symbol$version]($style) "
detect_files = ["package.json", ".nvmrc", ".node-version"]

# ── Python ───────────────────────────────────────────────────────────────────
[python]
symbol        = " "
style         = "yellow bold"
format        = "via [$symbol$pyenv_prefix($version)( \\($virtualenv\\))]($style) "
detect_files  = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile"]

# ── Rust ─────────────────────────────────────────────────────────────────────
[rust]
symbol = " "
style  = "peach bold"
format = "via [$symbol$version]($style) "

# ── Go ───────────────────────────────────────────────────────────────────────
[golang]
symbol = " "
style  = "sky bold"
format = "via [$symbol$version]($style) "

# ── Package version ──────────────────────────────────────────────────────────
[package]
symbol  = "󰏗 "
style   = "peach bold"
format  = "[$symbol$version]($style) "
display_private = false

# ── Execution time ───────────────────────────────────────────────────────────
[cmd_duration]
style             = "pink bold"
format            = "took [󱦟 $duration]($style) "
min_time          = 2000
show_milliseconds = false

# ── Fill + Time ──────────────────────────────────────────────────────────────
[fill]
symbol = " "

[time]
disabled    = false
style       = "surface2 bold"
format      = "[ $time]($style)"
time_format = "%H:%M"

# ── Cursor ───────────────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold mauve)"

# ── Catppuccin Mocha palette ─────────────────────────────────────────────────
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba4f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"
